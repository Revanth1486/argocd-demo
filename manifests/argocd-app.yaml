apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-yaml-demo
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Revanth1486/argocd-demo.git
    targetRevision: HEAD
    path: manifests

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      enabled: true
